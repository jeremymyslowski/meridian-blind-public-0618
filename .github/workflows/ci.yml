name: CI

on:
  push:
    branches: [main, 'scenario/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meridian -d meridian"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://meridian:meridian@localhost:5432/meridian
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Run migrations
        run: bash scripts/ci-migrate.sh

      - name: Ruff
        run: python -m ruff check apps/api

      - name: Pytest
        run: python -m pytest apps/api/tests/ -v

  web:
    name: Web (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix packages/ui-kit
          npm ci --prefix apps/web

      - name: Lint
        run: npm run lint --prefix apps/web

      - name: Test
        run: npm test --prefix apps/web -- --run

      - name: Build
        run: npm run build --prefix apps/web

  worker:
    name: Worker (Go 1.22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/worker/go.sum

      - name: Test
        working-directory: apps/worker
        run: go test ./...

  codegen:
    name: OpenAPI contract
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify OpenAPI and api-client sync
        run: python scripts/check-codegen.py