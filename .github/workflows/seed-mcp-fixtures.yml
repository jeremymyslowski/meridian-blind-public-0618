name: Seed MCP Fixtures

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  seed:
    name: Seed issues, PRs, labels, tags
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gh CLI
        run: |
          gh --version
          jq --version

      - name: Seed MCP fixtures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/bootstrap-github-mcp-branches.sh --repo ${{ github.repository }}
          bash scripts/seed-github-mcp-fixtures.sh --repo ${{ github.repository }} --force