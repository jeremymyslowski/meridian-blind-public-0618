name: Codegen Check

on:
  push:
    branches: [main]
    paths:
      - 'docs/api/openapi.yaml'
      - 'packages/api-client/**'
      - 'scripts/check-codegen.py'
  pull_request:
    paths:
      - 'docs/api/openapi.yaml'
      - 'packages/api-client/**'
      - 'scripts/check-codegen.py'
  workflow_dispatch:

jobs:
  contract:
    name: OpenAPI ↔ api-client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check contract manifest
        run: python scripts/check-codegen.py
