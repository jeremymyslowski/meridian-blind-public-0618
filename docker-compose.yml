services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://meridian:meridian@postgres:5432/meridian?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRE_MINUTES: 60
      REDIS_URL: redis://redis:6379
      FEATURE_FLAGS_PATH: /packages/config/feature-flags.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./docs/api:/docs/api
      - ./packages/config:/packages/config:ro
      - ./scripts:/scripts:ro
      - ./lib:/lib:ro

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://meridian:meridian@postgres:5432/meridian?sslmode=disable
      WORKER_POLL_INTERVAL_SECONDS: 5
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - ./packages/api-client:/packages/api-client
      - ./packages/ui-kit:/packages/ui-kit
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  web_node_modules: